name: Atlas Industrial - CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test & Analyze

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-web:
    runs-on: ubuntu-latest
    name: Build Web
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v3
        with:
          name: atlas-industrial-web-${{ github.sha }}
          path: build/web/
          retention-days: 30

  quality:
    runs-on: ubuntu-latest
    name: Code Quality
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib/ test/ || true

      - name: Run tests with coverage
        run: flutter test --coverage || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  build-success:
    runs-on: ubuntu-latest
    name: Build Status
    needs: [test, build-web, quality]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.test.result }}" = "failure" ] || [ "${{ needs.build-web.result }}" = "failure" ]; then
            echo "❌ Build falhou!"
            exit 1
          fi
          echo "✅ Build completo com sucesso!"
