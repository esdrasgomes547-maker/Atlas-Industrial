name: atlas_industrial
description: >
  Catálogo universal premium de peças de engenharia mecânica.
  Especializado em componentes GLP (gás liquefeito de petróleo).
  Interface sofisticada com design industrial moderno.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.0

  # Navigation & Routing
  go_router: ^14.0.0

  # HTTP & APIs
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets (quando necessário adicionar)
  # assets:
  #   - assets/images/
  #   - assets/icons/
